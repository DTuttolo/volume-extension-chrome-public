<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volume Booster 300</title>
    <link rel="stylesheet" href="popup.css" />
</head>

<body>
    <main class="popup-card" role="application" aria-label="Volume Booster Panel">
        <section class="header-row">
            <p class="badge">Per-Site Audio Boost</p>
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">Light
                Mode</button>
        </section>

        <h1>Volume Booster 300</h1>
        <p class="subtitle">Extension from outoftheJack.<br />Thanks for using it.</p>
        <p class="local-note">Settings stay local on this device.</p>
        <p id="siteNotice" class="site-notice" aria-live="polite"></p>

        <section class="preset-grid" aria-label="Quick volume presets">
            <button class="preset-btn" type="button" data-level="0">Mute</button>
            <button class="preset-btn" type="button" data-level="100">100%</button>
            <button class="preset-btn" type="button" data-level="150">150%</button>
            <button class="preset-btn" type="button" data-level="200">200%</button>
            <button class="preset-btn" type="button" data-level="250">250%</button>
            <button class="preset-btn" type="button" data-level="300">300%</button>
        </section>

        <button id="popoutButton" class="popout-btn" type="button">Popout</button>

        <div class="slider-head">
            <label for="volumeSlider">Boost</label>
            <span id="currentLevel">100%</span>
        </div>
        <input id="volumeSlider" type="range" min="0" max="300" step="50" value="100"
            aria-label="Volume boost slider" />
        <div class="slider-track" aria-hidden="true">
            <div id="sliderFill" class="slider-fill"></div>
        </div>

        <p class="warning">Values above 100% can distort some audio streams.</p>
        <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
</body>

</html>
